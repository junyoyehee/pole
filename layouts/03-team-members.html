<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pole - 팀원 목록</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0C0C0F;
      --bg-secondary: #131317;
      --bg-tertiary: #1A1A20;
      --bg-elevated: #202028;
      --bg-hover: #24242E;
      --bg-active: #2A2A36;
      --border-subtle: rgba(255,255,255,0.05);
      --border-medium: rgba(255,255,255,0.09);
      --border-focus: rgba(167,139,250,0.5);
      --text-primary: #EDEDF0;
      --text-secondary: #9898A6;
      --text-tertiary: #5C5C72;
      --text-muted: #44445A;
      --accent: #A78BFA;
      --accent-bright: #C4B5FD;
      --accent-dim: rgba(167,139,250,0.12);
      --accent-glow: rgba(167,139,250,0.22);
      --teal: #2DD4BF;
      --teal-dim: rgba(45,212,191,0.10);
      --blue: #60A5FA;
      --blue-dim: rgba(96,165,250,0.10);
      --green: #4ADE80;
      --green-dim: rgba(74,222,128,0.10);
      --orange: #FB923C;
      --orange-dim: rgba(251,146,60,0.10);
      --pink: #F472B6;
      --pink-dim: rgba(244,114,182,0.10);
      --yellow: #FACC15;
      --yellow-dim: rgba(250,204,21,0.08);
      --cyan: #22D3EE;
      --cyan-dim: rgba(34,211,238,0.10);
      --indigo: #818CF8;
      --indigo-dim: rgba(129,140,248,0.10);
      --red: #F87171;
      --red-dim: rgba(248,113,113,0.10);
      --gray-badge: #71717A;
      --gray-badge-dim: rgba(113,113,122,0.12);
      --radius-xs: 4px;
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 14px;
      --shadow-md: 0 4px 24px rgba(0,0,0,0.55);
      --shadow-lg: 0 12px 40px rgba(0,0,0,0.65);
      --transition: 0.18s cubic-bezier(0.4, 0, 0.2, 1);
      --font-sans: 'Plus Jakarta Sans', -apple-system, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: var(--font-sans); background: var(--bg-primary); color: var(--text-primary); -webkit-font-smoothing: antialiased; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-medium); border-radius: 99px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-tertiary); }

    .app-shell { display: flex; min-height: 100vh; }
    .sidebar { width: 240px; background: var(--bg-secondary); border-right: 1px solid var(--border-subtle); position: fixed; top: 0; left: 0; bottom: 0; }
    .sidebar-header { padding: 14px 16px; border-bottom: 1px solid var(--border-subtle); display: flex; align-items: center; gap: 10px; height: 56px; }
    .sidebar-logo { width: 30px; height: 30px; background: linear-gradient(135deg, var(--accent), #7C3AED); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 800; font-size: 13px; box-shadow: 0 0 16px var(--accent-glow); }
    .sidebar-title { font-size: 16px; font-weight: 700; color: var(--text-primary); }
    .main { flex: 1; margin-left: 240px; }
    .header { height: 56px; background: var(--bg-secondary); border-bottom: 1px solid var(--border-subtle); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; position: sticky; top: 0; z-index: 50; }
    .header::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--accent-glow), transparent); }
    .breadcrumb { font-size: 13px; color: var(--text-tertiary); }
    .breadcrumb .current { color: var(--text-primary); font-weight: 500; }
    .content { padding: 20px; }

    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .page-title { font-size: 20px; font-weight: 700; }
    .page-subtitle { font-size: 13px; color: var(--text-tertiary); margin-top: 2px; }
    .btn { padding: 8px 14px; border: none; border-radius: var(--radius-md); font-size: 13px; font-weight: 600; font-family: var(--font-sans); cursor: pointer; display: inline-flex; align-items: center; gap: 5px; height: 38px; transition: var(--transition); }
    .btn-primary { background: linear-gradient(135deg, var(--accent), #7C3AED); color: #fff; }
    .btn-primary:hover { opacity: 0.9; box-shadow: 0 0 20px var(--accent-glow); }

    /* Filter */
    .filter-bar { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
    .filter-tab { padding: 6px 14px; border-radius: 99px; font-size: 13px; font-family: var(--font-sans); color: var(--text-tertiary); cursor: pointer; border: none; background: transparent; transition: var(--transition); }
    .filter-tab.active { background: var(--accent-dim); color: var(--accent-bright); font-weight: 600; }
    .filter-tab:hover { background: var(--bg-hover); color: var(--text-secondary); }
    .search-input { padding: 7px 12px; border: 1px solid var(--border-medium); border-radius: var(--radius-sm); font-size: 13px; font-family: var(--font-sans); width: 200px; outline: none; margin-left: auto; background: var(--bg-primary); color: var(--text-primary); transition: var(--transition); }
    .search-input::placeholder { color: var(--text-muted); }
    .search-input:focus { border-color: var(--border-focus); box-shadow: 0 0 0 3px var(--accent-dim); }

    /* Team Grid */
    .team-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
    .member-card { background: var(--bg-secondary); border: 1px solid var(--border-subtle); border-radius: var(--radius-md); padding: 20px; text-align: center; transition: var(--transition); cursor: pointer; position: relative; }
    .member-card:hover { border-color: var(--border-medium); box-shadow: var(--shadow-md); }
    .member-avatar { width: 56px; height: 56px; border-radius: 50%; background: var(--accent-dim); display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 700; color: var(--accent); margin: 0 auto 10px; position: relative; }
    .member-status { width: 12px; height: 12px; border-radius: 50%; border: 2px solid var(--bg-secondary); position: absolute; bottom: 0; right: 0; }
    .member-status.working { background: var(--green); }
    .member-status.meeting { background: var(--yellow); }
    .member-status.away { background: var(--gray-badge); }
    .member-status.vacation { background: var(--red); }
    .member-name { font-size: 14px; font-weight: 600; margin-bottom: 2px; color: var(--text-primary); }
    .member-position { font-size: 12px; color: var(--text-tertiary); margin-bottom: 8px; }
    .member-part { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 10px; font-weight: 600; font-family: var(--font-mono); }
    .part-fe { background: var(--blue-dim); color: var(--blue); }
    .part-be { background: var(--accent-dim); color: var(--accent); }
    .part-design { background: var(--pink-dim); color: var(--pink); }
    .part-pm { background: var(--orange-dim); color: var(--orange); }
    .part-qa { background: var(--green-dim); color: var(--green); }
    .member-contact { margin-top: 10px; display: flex; justify-content: center; gap: 6px; }
    .contact-btn { width: 28px; height: 28px; border: 1px solid var(--border-medium); border-radius: var(--radius-sm); background: var(--bg-elevated); font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: var(--transition); }
    .contact-btn:hover { background: var(--bg-hover); border-color: var(--border-focus); }
    .role-badge { position: absolute; top: 10px; right: 10px; font-size: 9px; font-weight: 600; padding: 2px 6px; border-radius: 99px; font-family: var(--font-mono); }
    .role-lead { background: var(--orange-dim); color: var(--orange); }
    .role-admin { background: var(--red-dim); color: var(--red); }

    /* Part Section */
    .part-section { margin-bottom: 24px; }
    .part-title { font-size: 14px; font-weight: 600; color: var(--text-secondary); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
    .part-count { font-size: 12px; color: var(--text-muted); font-weight: 400; font-family: var(--font-mono); }
  </style>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-header"><div class="sidebar-logo">P</div><span class="sidebar-title">Pole</span></div>
    </aside>
    <main class="main">
      <header class="header">
        <div class="breadcrumb">관리 / <span class="current">팀원 관리</span></div>
      </header>
      <div class="content">
        <div class="page-header">
          <div>
            <div class="page-title">팀원 관리</div>
            <div class="page-subtitle">총 20명의 팀원</div>
          </div>
          <button class="btn btn-primary">+ 팀원 초대</button>
        </div>
        <div class="filter-bar">
          <button class="filter-tab active">전체 (20)</button>
          <button class="filter-tab">Frontend (6)</button>
          <button class="filter-tab">Backend (5)</button>
          <button class="filter-tab">Design (4)</button>
          <button class="filter-tab">PM (3)</button>
          <button class="filter-tab">QA (2)</button>
          <input type="text" class="search-input" placeholder="이름 검색...">
        </div>

        <!-- Frontend -->
        <div class="part-section">
          <div class="part-title">Frontend <span class="part-count">6명</span></div>
          <div class="team-grid">
            <div class="member-card">
              <span class="role-badge role-lead">Lead</span>
              <div class="member-avatar">일<div class="member-status working"></div></div>
              <div class="member-name">일달러</div>
              <div class="member-position">Frontend Lead</div>
              <span class="member-part part-fe">Frontend</span>
              <div class="member-contact"><button class="contact-btn">✉️</button><button class="contact-btn">💬</button></div>
            </div>
            <div class="member-card">
              <div class="member-avatar">김<div class="member-status working"></div></div>
              <div class="member-name">김민수</div>
              <div class="member-position">Sr. Frontend Dev</div>
              <span class="member-part part-fe">Frontend</span>
              <div class="member-contact"><button class="contact-btn">✉️</button><button class="contact-btn">💬</button></div>
            </div>
            <div class="member-card">
              <div class="member-avatar">박<div class="member-status working"></div></div>
              <div class="member-name">박철수</div>
              <div class="member-position">Frontend Dev</div>
              <span class="member-part part-fe">Frontend</span>
              <div class="member-contact"><button class="contact-btn">✉️</button><button class="contact-btn">💬</button></div>
            </div>
            <div class="member-card">
              <div class="member-avatar">조<div class="member-status meeting"></div></div>
              <div class="member-name">조수빈</div>
              <div class="member-position">Frontend Dev</div>
              <span class="member-part part-fe">Frontend</span>
              <div class="member-contact"><button class="contact-btn">✉️</button><button class="contact-btn">💬</button></div>
            </div>
          </div>
        </div>

        <!-- Design -->
        <div class="part-section">
          <div class="part-title">Design <span class="part-count">4명</span></div>
          <div class="team-grid">
            <div class="member-card">
              <span class="role-badge role-lead">Lead</span>
              <div class="member-avatar" style="background:var(--pink-dim);color:var(--pink)">김<div class="member-status working"></div></div>
              <div class="member-name">김디자</div>
              <div class="member-position">Design Lead</div>
              <span class="member-part part-design">Design</span>
              <div class="member-contact"><button class="contact-btn">✉️</button><button class="contact-btn">💬</button></div>
            </div>
            <div class="member-card">
              <div class="member-avatar" style="background:var(--pink-dim);color:var(--pink)">박<div class="member-status working"></div></div>
              <div class="member-name">박디자</div>
              <div class="member-position">UI/UX Designer</div>
              <span class="member-part part-design">Design</span>
              <div class="member-contact"><button class="contact-btn">✉️</button><button class="contact-btn">💬</button></div>
            </div>
            <div class="member-card">
              <div class="member-avatar" style="background:var(--pink-dim);color:var(--pink)">윤<div class="member-status away"></div></div>
              <div class="member-name">윤서아</div>
              <div class="member-position">UI Designer</div>
              <span class="member-part part-design">Design</span>
              <div class="member-contact"><button class="contact-btn">✉️</button><button class="contact-btn">💬</button></div>
            </div>
            <div class="member-card">
              <div class="member-avatar" style="background:var(--pink-dim);color:var(--pink)">이<div class="member-status vacation"></div></div>
              <div class="member-name">이하은</div>
              <div class="member-position">Graphic Designer</div>
              <span class="member-part part-design">Design</span>
              <div class="member-contact"><button class="contact-btn">✉️</button><button class="contact-btn">💬</button></div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
</body>
</html>
